<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUD`TIME - Geli Password Cusub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="petals-container" id="petals"></div>

    <div class="auth-container">
        <div class="auth-card">
            
            <div class="auth-logo">
                <h1>MUD`<span>TIME</span></h1>
                <p>Password Cusub</p>
                <p style="font-size: 0.85rem; color: #666; margin-top: 10px; text-transform: none; font-weight: normal;">
                    Fadlan hoos ku qor password-kaaga cusub, hubina in aad labada meeloodba isku mid ka dhigto.
                </p>
            </div>

            <form id="newPassForm">
                
                <div class="form-group">
                    <label class="form-label">Geli Password Cusub</label>
                    <div class="input-wrapper">
                        <input type="password" id="newPassword" class="form-input" placeholder="Gali Password Cusub" required>
                        <i class="fa-solid fa-lock input-icon"></i>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Ku celi Password-ka</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirmPassword" class="form-input" placeholder="Ku celi Password-ka Cusub" required>
                        <i class="fa-solid fa-lock input-icon"></i>
                    </div>
                </div>

                <button type="submit" class="btn-primary btn" id="updateBtn">Bedel Password-ka <i class="fa-solid fa-arrows-rotate"></i></button>
            </form>

        </div>
    </div>

    <script>
        function createPetals() {
            const container = document.getElementById('petals');
            const petalCount = 15; 
            
            for (let i = 0; i < petalCount; i++) {
                const petal = document.createElement('div');
                petal.classList.add('petal');
                
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.width = Math.random() * 12 + 8 + 'px';
                petal.style.height = Math.random() * 12 + 8 + 'px';
                petal.style.animationDelay = Math.random() * 8 + 's';
                petal.style.animationDuration = Math.random() * 6 + 6 + 's';
                
                container.appendChild(petal);
            }
        }
        createPetals();
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAaRTHlkfc0fDwfVNCDvqtMqg39NzIsqhY",
            authDomain: "login-6f03a.firebaseapp.com",
            projectId: "login-6f03a",
            storageBucket: "login-6f03a.firebasestorage.app",
            messagingSenderId: "392453627354",
            appId: "1:392453627354:web:dd84fb1a0e4d18790cb4e3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Hubi in qofku sifo sharci ah ku soo maray boggagii hore
        const userEmail = sessionStorage.getItem('resetEmail');
        
        if (!userEmail) {
            alert('Wadada aad soo martay waa khalad. Fadlan dib ugu noqo bogga hore.');
            window.location.href = 'forgot-password.html';
        }

        document.getElementById('newPassForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const pass1 = document.getElementById('newPassword').value;
            const pass2 = document.getElementById('confirmPassword').value;
            const updateBtn = document.getElementById('updateBtn');

            // Hubi in labada password ay isku mid yihiin
            if (pass1 !== pass2) {
                alert('Labada Password isku mid ma aha! Fadlan isku toosi. ❌');
                return; 
            }

            // Hubi in password-ku uusan aad u gaabnayn
            if (pass1.length < 6) {
                alert('Password-ku waa inuu ahaado ugu yaraan 6 xaraf/lambar. ❌');
                return;
            }

            // UI feedback inta uu isbeddelku socdo
            updateBtn.innerHTML = 'Waa la bedelayaa... <i class="fa-solid fa-spinner fa-spin"></i>';
            updateBtn.style.backgroundColor = 'var(--accent-gold)';
            updateBtn.disabled = true;

            try {
                // Abbaar xogta qofka (Document-ga) adiga oo isticmaalaya email-kiisa
                const docRef = doc(db, "users", userEmail);
                
                // updateDoc waxa uu bedelayaa kaliya qaybta 'password'
                await updateDoc(docRef, {
                    password: pass1
                });

                alert('Guul! Password-kaaga si guul leh ayaa loo bedelay. ✅');
                
                // Nadiifi Session-ka si xogta qofka aysan browser-ka ugu dhex harin (Amni)
                sessionStorage.removeItem('resetEmail');
                sessionStorage.removeItem('resetCode');
                sessionStorage.removeItem('resetName');

                // U wareeji bogga Login-ka si uu ugu soo galo password-ka cusub
                window.location.href = 'login.html';

            } catch (error) {
                alert('Cilad ayaa dhacday markii la bedelayay: ' + error.message);
                updateBtn.innerHTML = 'Bedel Password-ka <i class="fa-solid fa-arrows-rotate"></i>';
                updateBtn.style.backgroundColor = 'var(--primary-coffee)';
                updateBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
