<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geli Password Cusub</title>
    <link rel="stylesheet" href="reset-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h2>Password Cusub</h2>
        <p>Fadlan hoos ku qor password-kaaga cusub, hubina in aad labada meeloodba isku mid ka dhigto.</p>
        
        <form id="newPassForm">
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="newPassword" placeholder="Gali Password Cusub" required>
            </div>
            
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="confirmPassword" placeholder="Ku celi Password-ka Cusub" required>
            </div>

            <button type="submit" class="btn" id="updateBtn">Bedel Password-ka <i class="fa-solid fa-arrows-rotate"></i></button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        // Halkan waxaan ku soo kordhinay 'updateDoc' si aan password-ka kaliya u bedelno
        import { getFirestore, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // Xogta Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAaRTHlkfc0fDwfVNCDvqtMqg39NzIsqhY",
            authDomain: "login-6f03a.firebaseapp.com",
            projectId: "login-6f03a",
            storageBucket: "login-6f03a.firebasestorage.app",
            messagingSenderId: "392453627354",
            appId: "1:392453627354:web:dd84fb1a0e4d18790cb4e3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Hubi in qofku sifo sharci ah ku soo maray boggagii hore
        const userEmail = sessionStorage.getItem('resetEmail');
        
        if (!userEmail) {
            alert('Wadada aad soo martay waa khalad. Fadlan dib ugu noqo bogga hore.');
            window.location.href = 'forgot-password.html';
        }

        document.getElementById('newPassForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const pass1 = document.getElementById('newPassword').value;
            const pass2 = document.getElementById('confirmPassword').value;
            const updateBtn = document.getElementById('updateBtn');

            // Hubi in labada password ay isku mid yihiin
            if (pass1 !== pass2) {
                alert('Labada Password isku mid ma aha! Fadlan isku toosi. ❌');
                return; // Halkan jooji hawsha inta uu ka saxayo
            }

            // Hubi in password-ku uusan aad u gaabnayn
            if (pass1.length < 6) {
                alert('Password-ku waa inuu ahaado ugu yaraan 6 xaraf/lambar. ❌');
                return;
            }

            updateBtn.innerHTML = 'Waa la bedelayaa... <i class="fa-solid fa-spinner fa-spin"></i>';
            updateBtn.disabled = true;

            try {
                // Abbaar xogta qofka (Document-ga) adiga oo isticmaalaya email-kiisa
                const docRef = doc(db, "users", userEmail);
                
                // updateDoc waxa uu bedelayaa kaliya qaybta 'password', xogihii kalena (sida magaca) wuu deynayaa
                await updateDoc(docRef, {
                    password: pass1
                });

                alert('Guul! Password-kaaga si guul leh ayaa loo bedelay. ✅');
                
                // Nadiifi Session-ka si xogta qofka aysan browser-ka ugu dhex harin (Amni)
                sessionStorage.removeItem('resetEmail');
                sessionStorage.removeItem('resetCode');
                sessionStorage.removeItem('resetName');

                // U wareeji bogga Login-ka si uu ugu soo galo password-ka cusub
                window.location.href = 'login.html';

            } catch (error) {
                alert('Cilad ayaa dhacday markii la bedelayay: ' + error.message);
                updateBtn.innerHTML = 'Bedel Password-ka <i class="fa-solid fa-arrows-rotate"></i>';
                updateBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
