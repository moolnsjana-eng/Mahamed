<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soo Gal (Login)</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <h2>Soo Gal</h2>
        <form action="Home.html" method="GET">
            
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" placeholder="Gali Email-kaaga" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" placeholder="Gali Password-ka" required>
            </div>

            <button type="submit" class="btn">Login <i class="fa-solid fa-right-to-bracket"></i></button>
            
        </form>

        <p class="link-text">Wali ma is-diiwaangalisay? <a href="Register.html">Is-diiwaangali Halkan</a></p>
    </div>

</body>
</html>
