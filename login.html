<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUD`TIME - Soo Gal (Login)</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="petals-container" id="petals"></div>

    <div class="auth-container">
        <div class="auth-card">
            
            <div class="auth-logo">
                <h1>MUD`<span>TIME</span></h1>
                <p>Ku soo dhawaaw maqaaxidaada</p>
            </div>

            <form id="loginForm">
                
                <div class="form-group">
                    <label class="form-label">Email-kaaga</label>
                    <div class="input-wrapper">
                        <input type="email" id="loginEmail" class="form-input" placeholder="Gali Email-kaaga" required>
                        <i class="fa-solid fa-envelope input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Password-ka</label>
                    <div class="input-wrapper">
                        <input type="password" id="loginPassword" class="form-input" placeholder="Gali Password-ka" required>
                        <i class="fa-solid fa-lock input-icon"></i>
                    </div>
                </div>

                <div class="form-options">
                    <div></div> <a href="forgot-password.html" class="form-link">Ma ilowday Password-ka?</a>
                </div>

                <button type="submit" class="btn-primary btn">Login <i class="fa-solid fa-right-to-bracket"></i></button>
                
            </form>

            <p class="auth-footer">Wali ma is-diiwaangalisay? <a href="Register.html">Is-diiwaangali Halkan</a></p>
        </div>
    </div>

    <script>
        function createPetals() {
            const container = document.getElementById('petals');
            const petalCount = 15; // Tirada caleemaha
            
            for (let i = 0; i < petalCount; i++) {
                const petal = document.createElement('div');
                petal.classList.add('petal');
                
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.width = Math.random() * 12 + 8 + 'px';
                petal.style.height = Math.random() * 12 + 8 + 'px';
                petal.style.animationDelay = Math.random() * 8 + 's';
                petal.style.animationDuration = Math.random() * 6 + 6 + 's';
                
                container.appendChild(petal);
            }
        }
        createPetals();
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAaRTHlkfc0fDwfVNCDvqtMqg39NzIsqhY",
          authDomain: "login-6f03a.firebaseapp.com",
          projectId: "login-6f03a",
          storageBucket: "login-6f03a.firebasestorage.app",
          messagingSenderId: "392453627354",
          appId: "1:392453627354:web:dd84fb1a0e4d18790cb4e3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault(); 

            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPassword').value;

            // Badhanka soo galka oo loo yeelayo animations inta xogta la hubinayo
            const btn = document.querySelector('.btn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = 'Falanqaynaya... <i class="fa-solid fa-spinner fa-spin"></i>';
            btn.style.backgroundColor = 'var(--accent-gold)';

            try {
                const docRef = doc(db, "users", email);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const userData = docSnap.data();

                            if (userData.password === pass) {
            alert('Ku soo dhawaada sxb ' + userData.name + '!');
            
            // 1. Halkan ku kaydi afgarashada rasmiga ah (Waxay qaadanaysaa email-kii saxda ahaa)
            sessionStorage.setItem('userEmail', email); 
            sessionStorage.setItem('userName', userData.name); // Sidoo kale magaciisa kaydi
            sessionStorage.setItem('isLoggedIn', 'true'); 

            // 2. Ka dib u oggolow inuu u gudbo Home-ka
            window.location.href = 'Home.html';
        } else {
                        alert('Password-kaagu waa qaldan yahay! ❌');
                        btn.innerHTML = originalHTML;
                        btn.style.backgroundColor = 'var(--primary-coffee)';
                    }
                } else {
                    alert('Email-kan ma aha mid is-diiwaangeliyey! ❌');
                    btn.innerHTML = originalHTML;
                    btn.style.backgroundColor = 'var(--primary-coffee)';
                }
            } catch (error) {
                alert('Cilad ayaa dhacday: ' + error.message);
                btn.innerHTML = originalHTML;
                btn.style.backgroundColor = 'var(--primary-coffee)';
            }
        });
    </script>
</body>
</html>
