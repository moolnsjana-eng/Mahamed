<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xaqiiji Koodhka</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <h2>Gali Koodhka</h2>
        <p class="link-text" style="margin-bottom: 20px;">Koodh lix god ah ayaa laguugu diray Email-kaaga. Fadlan hoos ku qor.</p>
        
        <form id="verifyForm">
            <div class="input-group">
                <i class="fa-solid fa-key"></i>
                <input type="number" id="enteredCode" placeholder="Tusaale: 123456" required>
            </div>

            <button type="submit" class="btn">Xaqiiji Koodhka <i class="fa-solid fa-circle-check"></i></button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('verifyForm');

            form.addEventListener('submit', function(e) {
                e.preventDefault(); 

                const userCode = document.getElementById('enteredCode').value;
                const savedCode = sessionStorage.getItem('savedCode');

                if (userCode === savedCode) {
                    alert('Waa la xaqiijiyay! ✅');
                    window.location.href = 'home.html'; 
                } else {
                    alert('Koodhku waa qaldan yahay, fadlan dib u hubi.');
                }
            });
        });
    </script>

</body>
</html>
