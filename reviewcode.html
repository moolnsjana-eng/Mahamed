<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xaqiiji Koodhka</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <h2>Gali Koodhka</h2>
        <p class="link-text" style="margin-bottom: 20px;">Koodh lix god ah ayaa laguugu diray Email-kaaga. Fadlan hoos ku qor.</p>
        
        <form id="verifyForm">
            <div class="input-group">
                <i class="fa-solid fa-key"></i>
                <input type="number" id="enteredCode" placeholder="Tusaale: 123456" required>
            </div>

            <button type="submit" class="btn">Xaqiiji Koodhka <i class="fa-solid fa-circle-check"></i></button>
        </form>
    </div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAaRTHlkfc0fDwfVNCDvqtMqg39NzIsqhY",
    authDomain: "login-6f03a.firebaseapp.com",
    projectId: "login-6f03a",
    storageBucket: "login-6f03a.firebasestorage.app",
    messagingSenderId: "392453627354",
    appId: "1:392453627354:web:dd84fb1a0e4d18790cb4e3"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Marka xaqiijinta la taabto
  document.getElementById('verifyForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const userCode = document.getElementById('enteredCode').value;
      const savedCode = sessionStorage.getItem('savedCode');

      if (userCode === savedCode) {
          // Xogta ka soo qaad kaydka
          const name = sessionStorage.getItem('userName');
          const email = sessionStorage.getItem('userEmail');
          const pass = sessionStorage.getItem('userPassword');

          try {
              // U dir Firebase
              await setDoc(doc(db, "users", email), {
                  name: name,
                  email: email,
                  password: pass,
                  date: new Date().toISOString()
              });
              alert('Waa la diiwaangeliyay! ✅');
              window.location.href = 'home.html';
          } catch (error) {
              alert('Cilad ayaa dhacday: ' + error.message);
          }
      } else {
          alert('Koodhkaagu waa qaldan yahay.');
      }
  });
</script>

</body>
</html>
