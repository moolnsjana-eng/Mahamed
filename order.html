<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUD`TIME - Xaqiijinta Dalabka</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Qurxinta dheeriga ah ee kaarka dalabka dhexdiisa */
        .order-summary {
            background: rgba(255, 255, 255, 0.5);
            border-radius: var(--border-radius-sm);
            padding: 15px;
            margin-bottom: 25px;
            text-align: center;
            border: 1px dashed var(--accent-gold);
        }
        .order-summary img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: var(--border-radius-sm);
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .order-summary h3 {
            color: var(--primary-coffee);
            font-size: 1.3rem;
            margin-bottom: 5px;
        }
        .order-summary .price {
            color: var(--accent-gold);
            font-size: 1.2rem;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="petals-container" id="petals"></div>

    <div class="auth-container">
        <div class="auth-card" style="max-width: 500px;">
            <div class="auth-logo">
                <h1>MUD`<span>DALAB</span></h1>
                <p>Fadlan xaqiiji dalabkaaga hoose</p>
            </div>

            <div class="order-summary">
                <img id="displayImage" src="" alt="Cuntada">
                <h3 id="displayName">Magaca Cuntada</h3>
                <p class="price" id="displayPrice">$0.00</p>
            </div>

            <form id="confirmOrderForm">
                <div class="form-group">
                    <label class="form-label">Lambarka Taleefanka (EVC/ZAAD/SAHAL)</label>
                    <div class="input-wrapper">
                        <input type="number" id="userPhone" class="form-input" placeholder="Tusaale: 61XXXXXXX" required>
                        <i class="fa-solid fa-phone input-icon"></i>
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="confirmBtn">
                    Xaqiiji Dalabka <i class="fa-solid fa-circle-check"></i>
                </button>

                <div id="statusMessage" style="text-align: center; margin-top: 15px; font-weight: 600; display: none;"></div>
            </form>

            <div class="auth-footer" style="margin-top: 20px;">
                <a href="home.html"><i class="fa-solid fa-arrow-left"></i> Ka noqo oo badal dalabka</a>
            </div>
        </div>
    </div>

    <script>
        // Animation-ka caleemaha
        function createPetals() {
            const container = document.getElementById('petals');
            const petalCount = 15; 
            for (let i = 0; i < petalCount; i++) {
                const petal = document.createElement('div');
                petal.classList.add('petal');
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.width = Math.random() * 12 + 8 + 'px';
                petal.style.height = Math.random() * 12 + 8 + 'px';
                petal.style.animationDelay = Math.random() * 8 + 's';
                petal.style.animationDuration = Math.random() * 6 + 6 + 's';
                container.appendChild(petal);
            }
        }
        createPetals();

        // 1. Soo jiid xogtii laga soo diray home.html
        const selectedItemName = sessionStorage.getItem('selectedItemName');
        const selectedItemPrice = sessionStorage.getItem('selectedItemPrice');
        const selectedItemImage = sessionStorage.getItem('selectedItemImage');
        const userEmail = sessionStorage.getItem('userEmail') || localStorage.getItem('userEmail');

        // Haddii qofku si tuugo ah usoo galo boggan isagoon cunto soo dooran, dib u celi!
        if (!selectedItemName || !userEmail) {
            window.location.href = 'home.html';
        } else {
            // Ku qor xogta shaashadda
            document.getElementById('displayName').innerText = selectedItemName;
            document.getElementById('displayPrice').innerText = selectedItemPrice;
            if (selectedItemImage) {
                document.getElementById('displayImage').src = selectedItemImage;
            } else {
                document.getElementById('displayImage').src = 'https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=500'; // Default image
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAaRTHlkfc0fDwfVNCDvqtMqg39NzIsqhY",
            authDomain: "login-6f03a.firebaseapp.com",
            projectId: "login-6f03a",
            storageBucket: "login-6f03a.firebasestorage.app",
            messagingSenderId: "392453627354",
            appId: "1:392453627354:web:dd84fb1a0e4d18790cb4e3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const confirmOrderForm = document.getElementById('confirmOrderForm');
        const confirmBtn = document.getElementById('confirmBtn');
        const statusMessage = document.getElementById('statusMessage');

        confirmOrderForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Badalo xaalada badhanka
            const originalBtnText = confirmBtn.innerHTML;
            confirmBtn.innerHTML = 'Waa la dirayaa... <i class="fa-solid fa-spinner fa-spin"></i>';
            confirmBtn.disabled = true;

            const phone = document.getElementById('userPhone').value;

            try {
                // Ku dar Database-ka qaybta "orders"
                await addDoc(collection(db, "orders"), {
                    userEmail: sessionStorage.getItem('userEmail') || localStorage.getItem('userEmail'),
                    itemName: sessionStorage.getItem('selectedItemName'),
                    price: sessionStorage.getItem('selectedItemPrice'),
                    phone: phone,
                    status: "Pending", // Tani waxay ka dhigaysaa "Waa la sugayaa" jadwalka home.html
                    timestamp: serverTimestamp() // Waqtiga la dalbaday
                });

                // Fariin Guul ah
                statusMessage.style.display = 'block';
                statusMessage.style.color = '#059669'; 
                statusMessage.innerText = '✅ Dalabkaagu waa guulaystay! Dib ayaa laguu celinayaa...';
                
                // Nadiifi xogta dalabka ee kaydsanayd
                sessionStorage.removeItem('selectedItemID');
                sessionStorage.removeItem('selectedItemName');
                sessionStorage.removeItem('selectedItemPrice');
                sessionStorage.removeItem('selectedItemImage');

                // Dib ugu celi home.html 2 ilbiriqsi kadib si uu u arko History-giisa
                setTimeout(() => {
                    window.location.href = 'Home.html';
                }, 2000);

            } catch (error) {
                console.error("Cilad: ", error);
                statusMessage.style.display = 'block';
                statusMessage.style.color = '#ef4444'; 
                statusMessage.innerText = '❌ Cilad ayaa dhacday, isku day markale.';
                
                confirmBtn.innerHTML = originalBtnText;
                confirmBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
