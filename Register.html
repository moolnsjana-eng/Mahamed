<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Is-diiwaangali</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <h2>Is-diiwaangali</h2>
            
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" placeholder="Gali Magacaaga" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" placeholder="Gali Email-kaaga" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" placeholder="Gali Password-ka" required>
            </div>

            <button type="submit" class="btn">Send Code Email <i class="fa-solid fa-paper-plane"></i></button>
            
        </form>

        <p class="link-text">Hore ma u diiwaangashan tahay? <a href="login.html">Gal halkan (Login)</a></p>
    </div>
    <script>
        const form = document.querySelector('form');
        
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            // Soo qabo koodhka uu qofku soo galiyay iyo kii aan horay u xafidnay
            const enteredCode = document.querySelector('input[type="number"]').value;
            const savedCode = sessionStorage.getItem('savedCode');

            if (enteredCode === savedCode) {
                // Haddii uu sax yahay, u gudbi bogga Home.html
                window.location.href = 'Home.html';
            } else {
                // Haddii uu khalad yahay, u sheeg qofka
                alert('Koodhka aad galisay waa khalad! Fadlan hubi email-kaaga.');
            }
        });
    </script>
</body>
</html>
