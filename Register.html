<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Is-diiwaangali</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <h2>Is-diiwaangali</h2>
        
        <form id="registerForm"> 
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="userName" placeholder="Gali Magacaaga" required>
            </div>
            
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="userEmail" placeholder="Gali Email-kaaga" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="userPassword" placeholder="Gali Password-ka" required>
            </div>

            <button type="submit" class="btn">Send Code Email <i class="fa-solid fa-paper-plane"></i></button>
        </form>

        <p class="link-text">Hore ma u diiwaangashan tahay? <a href="login.html">Gal halkan (Login)</a></p>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init("CAZI5zTFZHRCJJ29P"); 
       })();
    </script>

    <script>
        const form = document.getElementById('registerForm');
        const btn = document.querySelector('.btn');

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            // 1. Soo qabo xogta
            const name = document.getElementById('userName').value;
            const email = document.getElementById('userEmail').value;
            const password = document.getElementById('userPassword').value;

            // 2. Ku kaydi sessionStorage (Muhiim u ah Firebase)
            sessionStorage.setItem('userName', name);
            sessionStorage.setItem('userEmail', email);
            sessionStorage.setItem('userPassword', password);

            // 3. Samee koodhka
            const verificationCode = Math.floor(100000 + Math.random() * 900000);
            sessionStorage.setItem('savedCode', verificationCode);

            // 4. Badhanka bedel
            btn.innerHTML = 'Waa la dirayaa... <i class="fa-solid fa-spinner fa-spin"></i>';
            btn.style.backgroundColor = '#f59e0b'; 

            const templateParams = {
                to_name: name,
                to_email: email,
                message: verificationCode
            };

            // 5. Dir Email-ka
            emailjs.send('service_dbjdryu', 'template_uac1ldy', templateParams)
                .then(function(response) {
                    window.location.href = 'reviewcode.html';
                }, function(error) {
                    alert('Cilad ayaa dhacday, fadlan dib u isku day.');
                    btn.innerHTML = 'Send Code Email <i class="fa-solid fa-paper-plane"></i>';
                    btn.style.backgroundColor = '#10b981';
                });
        });
    </script>
</body>
</html>
