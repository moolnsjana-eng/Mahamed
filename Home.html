<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUD`TIME - Home</title>
    <!-- CSS-ka gaarka ah ee aad dalbatay -->
    <link rel="stylesheet" href="css2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="app-container">
        
        <!-- Header & Search -->
        <div class="header">
            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Raadi cunto ama cabitaan...">
            </div>
            <button class="filter-btn">
                <i class="fa-solid fa-sliders"></i>
            </button>
        </div>

        <!-- Promo Banner -->
        <div class="promo-banner">
            <div class="promo-content">
                <h3>Best Quality<br>Coffee & Sweets</h3>
                <p>20% OFF Maanta!</p>
            </div>
        </div>

        <!-- Categories -->
        <div class="section-header">
            <h2>Noocyada (Categories)</h2>
            <a href="#">See all</a>
        </div>
        <div class="categories" id="categoryContainer">
            <!-- Buttons-ka halkan ayaa si automatic ah looga buuxinayaa JS -->
            <button class="cat-btn active" onclick="filterCategory('All', this)">Dhammaan</button>
            <button class="cat-btn" onclick="filterCategory('Sweets', this)">Sweets</button>
            <button class="cat-btn" onclick="filterCategory('Coffee', this)">Coffee</button>
            <button class="cat-btn" onclick="filterCategory('Cold Drinks', this)">Cold Drinks</button>
        </div>

        <!-- Menu Grid (Alaabta) -->
        <div class="menu-grid" id="menuContainer">
            <div style="grid-column: 1/-1; text-align: center; padding: 40px;">
                <i class="fa-solid fa-spinner fa-spin fa-2x" style="color: var(--primary-orange); margin-bottom: 15px;"></i>
                <p>Xogta ayaa soo socota...</p>
            </div>
        </div>

        <!-- History (Dalabyada Hore) -->
        <div class="history-section" id="historySection" style="display: none;">
            <div class="section-header">
                <h2>Dalabyadaydii Hore</h2>
            </div>
            <div id="historyContainer" style="font-size: 14px; color: #666;">
                Waa la soo raryaa...
            </div>
        </div>

        <!-- Bottom Navigation (U dhiganta sawirka) -->
        <nav class="bottom-nav">
            <i class="fa-solid fa-house nav-item active" onclick="showHome()"></i>
            <i class="fa-solid fa-clock-rotate-left nav-item" onclick="showHistory()"></i>
            <i class="fa-solid fa-cart-shopping nav-item"></i>
            <i class="fa-solid fa-right-from-bracket nav-item" onclick="logout()" style="color: #ef4444;"></i>
        </nav>

    </div>

    <!-- ==========================================
         JAVASCRIPT LOGIC (Firebase + Search/Filter)
         ========================================== -->
    <script>
        // Hubinta Macmiilka
        const userEmail = sessionStorage.getItem('userEmail');
        const isLoggedIn = sessionStorage.getItem('isLoggedIn');
        if (!userEmail || isLoggedIn !== 'true') {
            window.location.href = 'login.html';
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAaRTHlkfc0fDwfVNCDvqtMqg39NzIsqhY",
            authDomain: "login-6f03a.firebaseapp.com",
            projectId: "login-6f03a",
            storageBucket: "login-6f03a.firebasestorage.app",
            messagingSenderId: "392453627354",
            appId: "1:392453627354:web:dd84fb1a0e4d18790cb4e3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const userEmailLocal = sessionStorage.getItem('userEmail') || 
                          sessionStorage.getItem('resetEmail') || 
                          localStorage.getItem('userEmail') || 
                          localStorage.getItem('loggedUser'); 

        // Variable lagu keydiyo xogta oo dhan si Search-ga u fududaado
        let allProducts = [];

        // 1. Soo jeedinta Menu-ga Firebase
        async function loadMenu() {
            const menuContainer = document.getElementById('menuContainer');
            try {
                const querySnapshot = await getDocs(collection(db, "menu"));
                allProducts = []; // Nadiifi ka hor intaanad buuxin

                if (querySnapshot.empty) {
                    menuContainer.innerHTML = '<p style="text-align: center; grid-column: 1/-1;">Weli wax cunto ah laguma darin database-ka.</p>';
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const item = doc.data();
                    // Keydi xogta oo dhan oo id ku lifaaqan
                    allProducts.push({
                        id: doc.id,
                        name: item.name || 'Magac La\'aan',
                        price: item.price || '$0',
                        image: item.image || 'https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=500',
                        category: item.category || 'Other' // Category-gii sawirkaaga Firebase ku jiray
                    });
                });

                // Muuji xogta oo dhan markii ugu horaysa
                renderProducts(allProducts);

            } catch (error) {
                menuContainer.innerHTML = `<p style="color: red; text-align: center; grid-column: 1/-1;">Cilad ayaa ku dhacday: ${error.message}</p>`;
            }
        }

        // 2. Samaynta HTML-ka Card-yada (Function u gaar ah)
        function renderProducts(items) {
            const menuContainer = document.getElementById('menuContainer');
            menuContainer.innerHTML = '';

            if(items.length === 0) {
                menuContainer.innerHTML = '<p style="text-align: center; grid-column: 1/-1; color: #888;">Wax alaab ah lama helin.</p>';
                return;
            }

            items.forEach(item => {
                const cardHTML = `
                    <div class="product-card">
                        <img src="${item.image}" alt="${item.name}" class="product-img">
                        <h4 class="product-title">${item.name}</h4>
                        <p class="product-sub">${item.category}</p>
                        <div class="product-bottom">
                            <span class="product-price">${item.price}</span>
                            <button class="add-btn" onclick="selectItem('${item.id}', '${item.name}', '${item.price}', '${item.image}')">
                                +
                            </button>
                        </div>
                    </div>
                `;
                menuContainer.innerHTML += cardHTML;
            });
        }

        // 3. Shaandhaynta Categories-ka (Filter)
        window.filterCategory = function(categoryName, btnElement) {
            // Bedel midabka button-ka la gujiyay
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');

            if (categoryName === 'All') {
                renderProducts(allProducts);
            } else {
                const filtered = allProducts.filter(item => item.category.toLowerCase() === categoryName.toLowerCase());
                renderProducts(filtered);
            }
        }

        // 4. Raadinta (Live Search Logic)
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const searchResults = allProducts.filter(item => 
                item.name.toLowerCase().includes(searchTerm) || 
                item.category.toLowerCase().includes(searchTerm)
            );
            renderProducts(searchResults);
            
            // Ka qaad active-ka category buttons markaad search garaynayso
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
        });

        // 5. Soo jeedinta History-ga
        async function loadHistory() {
            const historyContainer = document.getElementById('historyContainer');
            try {
                const q = query(collection(db, "orders"), where("userEmail", "==", userEmailLocal));
                const querySnapshot = await getDocs(q);
                
                if (!querySnapshot.empty) {
                    historyContainer.innerHTML = ''; 
                    querySnapshot.forEach((doc) => {
                        const order = doc.data();
                        const statusColor = order.status === 'Completed' ? 'green' : 'orange';
                        
                        const historyHTML = `
                            <div style="border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between;">
                                <div>
                                    <strong>${order.itemName}</strong><br>
                                    <small>${order.price}</small>
                                </div>
                                <div style="text-align: right;">
                                    <span style="color: ${statusColor}; font-weight: bold; font-size: 12px;">${order.status}</span><br>
                                    <small>#${doc.id.substring(0, 5)}</small>
                                </div>
                            </div>
                        `;
                        historyContainer.innerHTML += historyHTML;
                    });
                } else {
                    historyContainer.innerHTML = 'Ma jiraan dalabyo hore.';
                }
            } catch (error) {
                console.log("Cilad history-ga: ", error);
            }
        }

        // 6. Function-ka Dalabka (Order)
        window.selectItem = function(id, name, price, image) {
            sessionStorage.setItem('selectedItemID', id);
            sessionStorage.setItem('selectedItemName', name);
            sessionStorage.setItem('selectedItemPrice', price);
            sessionStorage.setItem('selectedItemImage', image);
            window.location.href = 'order.html';
        }

        // 7. Isku bedelka Tabs-ka (Home iyo History)
        window.showHome = function() {
            document.getElementById('menuContainer').style.display = 'grid';
            document.querySelector('.categories').style.display = 'flex';
            document.querySelector('.promo-banner').style.display = 'flex';
            document.getElementById('historySection').style.display = 'none';
            
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            document.querySelectorAll('.nav-item')[0].classList.add('active');
        }

        window.showHistory = function() {
            document.getElementById('menuContainer').style.display = 'none';
            document.querySelector('.categories').style.display = 'none';
            document.querySelector('.promo-banner').style.display = 'none';
            document.getElementById('historySection').style.display = 'block';
            
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            document.querySelectorAll('.nav-item')[1].classList.add('active');
        }

        // Bilow shaqada markuu page-ku furmo
        loadMenu();
        loadHistory();
    </script>
</body>
</html>
