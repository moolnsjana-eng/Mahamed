<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUD`TIME - Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="petals-container" id="petals"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <h1>MUD`<span>ADMIN</span></h1>
                <p>Halkan si toos ah ugu dar cuntooyinka iyo sharaabyada Menu-ka</p>
            </div>

            <form id="addMenuForm">
                <div class="form-group">
                    <label class="form-label">Magaca Alaabta</label>
                    <div class="input-wrapper">
                        <input type="text" id="itemName" class="form-input" placeholder="Tusaale: Chocolate Cake" required>
                        <i class="fa-solid fa-mug-hot input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Qiimaha</label>
                    <div class="input-wrapper">
                        <input type="text" id="itemPrice" class="form-input" placeholder="Tusaale: $3.00" required>
                        <i class="fa-solid fa-tag input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Nooca (Category)</label>
                    <div class="input-wrapper">
                        <select id="itemCategory" class="form-input" required style="padding-left: 45px; appearance: none; cursor: pointer;">
                            <option value="Drinks">Sharaab (Drinks)</option>
                            <option value="Sweets">Macmacaan (Sweets)</option>
                            <option value="Food">Cunto (Food)</option>
                        </select>
                        <i class="fa-solid fa-list input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Link-ga Sawirka</label>
                    <div class="input-wrapper">
                        <input type="url" id="itemImage" class="form-input" placeholder="Geli link-ga sawirka (URL)..." required>
                        <i class="fa-solid fa-image input-icon"></i>
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="submitBtn">
                    Ku Dar Menu-ka <i class="fa-solid fa-cloud-arrow-up"></i>
                </button>
                
                <div id="statusMessage" style="text-align: center; margin-top: 15px; font-weight: 600; display: none;"></div>
            </form>

            <div class="auth-footer">
                <a href="home.html"><i class="fa-solid fa-arrow-left"></i> Ku noqo Bogga Hore (Home)</a>
            </div>
        </div>
    </div>

    <script>
        // Caleemaha Animation-ka
        function createPetals() {
            const container = document.getElementById('petals');
            const petalCount = 15; 
            for (let i = 0; i < petalCount; i++) {
                const petal = document.createElement('div');
                petal.classList.add('petal');
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.width = Math.random() * 12 + 8 + 'px';
                petal.style.height = Math.random() * 12 + 8 + 'px';
                petal.style.animationDelay = Math.random() * 8 + 's';
                petal.style.animationDuration = Math.random() * 6 + 6 + 's';
                container.appendChild(petal);
            }
        }
        createPetals();
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // Firebase Configuration-kaagii
        const firebaseConfig = {
            apiKey: "AIzaSyAaRTHlkfc0fDwfVNCDvqtMqg39NzIsqhY",
            authDomain: "login-6f03a.firebaseapp.com",
            projectId: "login-6f03a",
            storageBucket: "login-6f03a.firebasestorage.app",
            messagingSenderId: "392453627354",
            appId: "1:392453627354:web:dd84fb1a0e4d18790cb4e3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Koodhka Gudbinta Xogta
        const addMenuForm = document.getElementById('addMenuForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');

        addMenuForm.addEventListener('submit', async (e) => {
            e.preventDefault(); // Si uusan boggu isku refresh garayn
            
            // Badalo xaalada badhanka inta ay xogtu dhacayso
            const originalBtnText = submitBtn.innerHTML;
            submitBtn.innerHTML = 'Waa la dirayaa... <i class="fa-solid fa-spinner fa-spin"></i>';
            submitBtn.disabled = true;

            const name = document.getElementById('itemName').value;
            const price = document.getElementById('itemPrice').value;
            const category = document.getElementById('itemCategory').value;
            const image = document.getElementById('itemImage').value;

            try {
                // addDoc ayaa loo isticmaalaa si Firebase uu Auto-ID ugu sameeyo dukumentiga
                await addDoc(collection(db, "menu"), {
                    name: name,
                    price: price,
                    category: category,
                    image: image
                });

                // Haddii ay guulaysato, muuji fariin cagaaran
                statusMessage.style.display = 'block';
                statusMessage.style.color = '#059669'; 
                statusMessage.innerText = '✅ Si guul ah ayaa lagu daray!';
                
                // Nadiifi meelihii wax lagu qorayay si aad mid kale u geliso
                addMenuForm.reset();

                // Fariinta tirtir 3 ilbiriqsi kadib
                setTimeout(() => {
                    statusMessage.style.display = 'none';
                }, 3000);

            } catch (error) {
                console.error("Cilad: ", error);
                statusMessage.style.display = 'block';
                statusMessage.style.color = '#ef4444'; 
                statusMessage.innerText = '❌ Cilad ayaa dhacday, isku day markale.';
            } finally {
                // Badhanka kusoo celi sidii hore
                submitBtn.innerHTML = originalBtnText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
