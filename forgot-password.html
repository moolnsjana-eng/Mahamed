<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soo Celi Password-ka</title>
    <link rel="stylesheet" href="reset-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            // Public Key-gaaga rasmiga ah
            emailjs.init("CAZI5zTFZHRCJJ29P"); 
        })();
    </script>
</head>
<body>
    <div class="container">
        <h2>Soo Celi Password-ka</h2>
        <p>Fadlan geli email-kaaga si aan code xaqiijin ah kuugu dirno.</p>
        
        <form id="forgotForm">
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="resetEmail" placeholder="Gali Email-kaaga" required>
            </div>
            <button type="submit" class="btn" id="sendBtn">Dir Code-ka <i class="fa-solid fa-paper-plane"></i></button>
        </form>
        
        <p class="link-text"><a href="login.html">Dib ugu noqo Login</a></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // Xogta Firebase ee mashruucaaga
        const firebaseConfig = {
            apiKey: "AIzaSyAaRTHlkfc0fDwfVNCDvqtMqg39NzIsqhY",
            authDomain: "login-6f03a.firebaseapp.com",
            projectId: "login-6f03a",
            storageBucket: "login-6f03a.firebasestorage.app",
            messagingSenderId: "392453627354",
            appId: "1:392453627354:web:dd84fb1a0e4d18790cb4e3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('forgotForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('resetEmail').value.trim();
            const sendBtn = document.getElementById('sendBtn');
            
            // Bedel qoraalka badhanka si qofku u ogaado inuu sugayo
            sendBtn.innerHTML = 'Waa la dirayaa... <i class="fa-solid fa-spinner fa-spin"></i>';
            sendBtn.disabled = true;

            try {
                // Hubi in email-ka uu ku jiro Firestore
                const docRef = doc(db, "users", email);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const userData = docSnap.data();
                    
                    // Samee code 6 lambar ah oo random ah
                    const verificationCode = Math.floor(100000 + Math.random() * 900000).toString();
                    
                    // Xogta ku kaydi Session si loo isticmaalo boggaga xiga
                    sessionStorage.setItem('resetEmail', email);
                    sessionStorage.setItem('resetCode', verificationCode);

                    // Diyaari xogta loo dirayo EmailJS
                    const templateParams = {
                        to_email: email,
                        to_name: userData.name,
                        message: verificationCode 
                    };

                    // Dir email-ka adigoo isticmaalaya Service ID iyo Template ID-gaaga
                    emailjs.send("service_dbjdryu", "template_uac1ldy", templateParams)
                        .then(function(response) {
                            alert('Code-ka xaqiijinta ayaa loo diray Email-kaaga! ✅');
                            window.location.href = 'verify-reset.html';
                        }, function(error) {
                            alert('Cilad ayaa dhacday markii la dirayay Email-ka: ' + JSON.stringify(error));
                            sendBtn.innerHTML = 'Dir Code-ka <i class="fa-solid fa-paper-plane"></i>';
                            sendBtn.disabled = false;
                        });

                } else {
                    alert('Email-kan kuma jiro diiwaanka! Fadlan hubi xarfo-qalka. ❌');
                    sendBtn.innerHTML = 'Dir Code-ka <i class="fa-solid fa-paper-plane"></i>';
                    sendBtn.disabled = false;
                }
            } catch (error) {
                alert('Cilad ayaa dhacday: ' + error.message);
                sendBtn.innerHTML = 'Dir Code-ka <i class="fa-solid fa-paper-plane"></i>';
                sendBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
